---
name: Bug Report
description: 报告 excel-mcp-server 的 Bug
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间来报告 Bug！请填写以下信息来帮助我们更好地理解和解决问题。

  - type: textarea
    id: bug-description
    attributes:
      label: Bug 描述
      description: 详细描述遇到的问题
      placeholder: "简要描述您遇到的问题..."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: 重现步骤
      description: 提供详细的重现步骤
      placeholder: |
        1. 执行操作一...
        2. 执行操作二...
        3. 观察到问题...
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: 期望结果
      description: 描述应该发生什么
      placeholder: "期望的正常行为..."
    validations:
      required: true

  - type: textarea
    id: actual-result
    attributes:
      label: 实际结果
      description: 描述实际发生了什么
      placeholder: "实际观察到的行为..."
    validations:
      required: true

  - type: input
    id: environment-info
    attributes:
      label: 环境信息
      description: 请提供您的环境信息
      placeholder: "例如: Ubuntu 20.04, Python 3.9.0, excel-mcp-server v1.6.37"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 附加信息
      description: 任何其他有用的信息（如错误日志、截图等）
      placeholder: "粘贴错误日志、截图、或其他相关信息..."
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      description: 请确认以下事项
      options:
        - label: 我已经搜索了现有的 Issues，确认这是一个新问题
          required: true
        - label: 我已经尝试了最新的版本
          required: true
        - label: 我愿意提供更多信息来帮助解决这个问题
          required: true