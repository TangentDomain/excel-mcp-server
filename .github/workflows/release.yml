name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  # Requires PyPI Trusted Publisher configured at:
  # https://pypi.org/manage/project/excel-mcp-server-fastmcp/settings/publishing/
  # with: owner=TangentDomain, repo=excel-mcp-server, workflow=release.yml
  id-token: write  # For PyPI trusted publishing

jobs:
  build:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run python -m pytest tests/ -q --tb=short --timeout=30

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
