name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check docstring contracts
        run: python scripts/lint_docstring_contract.py

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Ruff lint check
        run: ruff check src/ tests/

      - name: Check for merge conflicts
        run: |
          if find . \( -name "*.py" -o -name "*.md" \) \
             -not -path "*/__pycache__/*" \
             -not -path "*/.git/*" \
             -not -path "*/.venv/*" \
             -not -path "*/docs/archive/*" \
             | xargs grep -l "<<<<<<<" 2>/dev/null; then
            echo "ERROR: 发现未解决的合并冲突"
            exit 1
          fi
          echo "✓ 无合并冲突"

      - name: Scan for sensitive info
        run: |
          if find . \( -name "*.py" -o -name "*.yml" -o -name "*.yaml" -o -name "*.toml" \) \
             -not -path "*/__pycache__/*" \
             -not -path "*/.venv/*" \
             -not -path "*/.git/*" \
             -not -path "*/.github/*" \
             -not -path "*/test_data/*" \
             -not -path "*/dist/*" \
             | xargs grep -lE "(AK[A-Za-z0-9_]{20,}|LTAI[A-Za-z0-9_]{20,})" 2>/dev/null; then
            echo "ERROR: 发现可能的敏感信息（AK/LTAI）"
            exit 1
          fi
          echo "✓ 无敏感信息泄露"

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run python -m pytest tests/ -q --tb=short --timeout=30
        shell: bash

  adversarial:
    name: Adversarial tests (L4 对抗闭环)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Invariant tests (INV-1~32)
        run: uv run python -m pytest tests/invariants/ -q --tb=short --timeout=30
      - name: Concurrent write tests (P1 per-file lock)
        run: uv run python -m pytest tests/test_p1_concurrent_fix.py -v --timeout=60
      - name: Security tests
        run: uv run python -m pytest tests/test_security.py tests/test_security_features.py tests/test_r43_security_fixes.py -q --tb=short --timeout=30
      - name: Edge case regression suite
        run: uv run python -m pytest tests/test_r44_edge_cases.py tests/test_r52_parser_edge_cases.py tests/test_boundary_values.py tests/test_edge_cases.py -q --tb=short --timeout=30
      - name: Confidence audit (Brier Score)
        run: python scripts/confidence_audit.py || true
