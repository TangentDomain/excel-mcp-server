[tool:pytest]
# pytest配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出格式
addopts =
    -v
    --tb=short
    --color=yes
    --maxfail=10
    --durations=10

# 警告过滤: 忽略openpyxl内部未关闭文件句柄的ResourceWarning(源码级修复待后续迭代)
filterwarnings =
    ignore::ResourceWarning
    default::DeprecationWarning
    ignore::pandas.errors.Pandas4Warning

# 标记定义（已迁移到 pyproject.toml [tool.pytest.ini_options]）

# 测试发现模式
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    .venv
    venv
    env
    __pycache__
    .pytest_cache
    htmlcov

# 超时设置
timeout = 600
timeout_method = thread

# 最小版本要求
minversion = 6.0

# 测试覆盖率配置
[coverage:run]
source = src
omit =
    tests/*
    test_*
    __pycache__/*
    *migrations*
    *venv*
    *env*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov
